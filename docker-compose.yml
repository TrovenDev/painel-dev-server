services:
  painel-dev-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: painel-dev-server
    volumes:
      - /root/dev-projetos:/workspace
      # Sessões do Claude Code (~/.claude/projects) — sem isso, /api/usage
      # perde todo o histórico a cada redeploy do container.
      - /root/dev-projetos-claude-home:/root/.claude
    environment:
      - WORKSPACE_PATH=/workspace
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
      - PORT=3001
    ports:
      - "3001"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge